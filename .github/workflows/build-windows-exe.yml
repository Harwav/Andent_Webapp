name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, for example 1.2.3. Defaults to app/version.py."
        required: false
        type: string
      create_release:
        description: "Create or update a GitHub Release in Harwav/Andent_Web_Release."
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller==6.14.2

      - name: Import audit
        shell: pwsh
        run: python -c "import app.main; import desktop.tray_runtime; print('imports ok')"

      - name: Focused packaging tests
        shell: pwsh
        run: |
          $env:PYTEST_DISABLE_PLUGIN_AUTOLOAD = "1"
          python -m pytest `
            tests/test_exe_packaging.py `
            tests/test_health_endpoints.py `
            tests/test_preform_setup.py::test_printers_route_resolves_material_code_to_label `
            -q

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if (-not $version -and "${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          if (-not $version) {
            $version = python -c "from app.version import __version__; print(__version__)"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build EXE
        shell: pwsh
        run: python scripts/builders/build_windows_exe.py --version "${{ steps.version.outputs.version }}"

      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "dist/FormFlow_v${{ steps.version.outputs.version }}.exe"
          if (-not (Test-Path $exe)) {
            throw "EXE not found at $exe"
          }
          $sizeMB = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "EXE found: $exe"
          Write-Host "Size: $sizeMB MB"
          if ($sizeMB -lt 60) {
            throw "EXE too small ($sizeMB MB < 60 MB minimum). Build may be incomplete."
          }

      - name: Smoke test EXE
        shell: pwsh
        run: |
          $exe = "dist/FormFlow_v${{ steps.version.outputs.version }}.exe"
          $env:FORMFLOW_WEB_PORT = "8765"
          $env:FORMFLOW_WEB_OPEN_BROWSER = "0"
          $process = Start-Process -FilePath $exe -PassThru -WindowStyle Hidden
          try {
            $healthy = $false
            for ($i = 0; $i -lt 60; $i++) {
              try {
                $response = Invoke-RestMethod -Uri "http://127.0.0.1:8765/health" -TimeoutSec 2
                if ($response.status -eq "healthy") {
                  $healthy = $true
                  break
                }
              } catch {
                Start-Sleep -Seconds 1
              }
            }
            if (-not $healthy) {
              throw "EXE did not become healthy on port 8765"
            }
          } finally {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            Get-Process | Where-Object { $_.Path -eq (Resolve-Path $exe).Path } |
              Stop-Process -Force -ErrorAction SilentlyContinue
            Get-NetTCPConnection -LocalPort 8765 -ErrorAction SilentlyContinue |
              ForEach-Object { Stop-Process -Id $_.OwningProcess -Force -ErrorAction SilentlyContinue }
            Start-Sleep -Seconds 2
            if (Get-NetTCPConnection -LocalPort 8765 -State Listen -ErrorAction SilentlyContinue) {
              throw "Port 8765 was still listening after EXE cleanup"
            }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FormFlow_v${{ steps.version.outputs.version }}
          path: dist/FormFlow_v${{ steps.version.outputs.version }}.exe
          retention-days: 7

      - name: Create GitHub Release in Public Repo
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.ANDENT_RELEASE_REPO_TOKEN }}
        run: |
          if (-not $env:GH_TOKEN) {
            throw "ANDENT_RELEASE_REPO_TOKEN is required to publish to Harwav/Andent_Web_Release."
          }

          $version = "${{ steps.version.outputs.version }}"
          $tagName = "v$version"
          $exeFile = (Resolve-Path "dist/FormFlow_v$version.exe").Path
          $repo = "Harwav/Andent_Web_Release"
          $assetName = Split-Path $exeFile -Leaf

          gh release view $tagName --repo $repo 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tagName already exists in $repo, updating $assetName..."
            gh release delete-asset $tagName $assetName --repo $repo --yes 2>$null
            gh release upload $tagName $exeFile --repo $repo
          } else {
            Write-Host "Creating release $tagName in $repo..."
            gh release create $tagName `
              --repo $repo `
              --title "FormFlow v$version" `
              --notes "## FormFlow v$version`n`nDownload the Windows EXE below to install or update Andent Web / FormFlow." `
              $exeFile
          }

      - name: Build summary
        shell: pwsh
        run: |
          $exe = Get-Item "dist/FormFlow_v${{ steps.version.outputs.version }}.exe"
          $sizeMB = [math]::Round($exe.Length / 1MB, 2)
          echo "# Build Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ steps.version.outputs.version }}" >> $env:GITHUB_STEP_SUMMARY
          echo "**Platform:** Windows" >> $env:GITHUB_STEP_SUMMARY
          echo "**Python:** 3.13.9" >> $env:GITHUB_STEP_SUMMARY
          echo "**Artifact:** ``$($exe.Name)`` ($sizeMB MB)" >> $env:GITHUB_STEP_SUMMARY
          echo "**Release repo:** Harwav/Andent_Web_Release" >> $env:GITHUB_STEP_SUMMARY
